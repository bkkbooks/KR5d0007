body:
  text: 真人行道任證頌道言善男女等欲得絶離諸苦升入無為當修習九頁進道之行夫道行者持戒止念淨心守一外斷諸見內除衆垢出離三有證彼無為自然而然得無上位爾時真人聞説是義心生解脫即至道場隨淺隨深俱蒙益利各稱其力而説頌曰初第一真人頌曰了出諸見諦心靜外垢除六邪虛妄盡正一自然居致得證無我至獨而不孤升遊衆妙門永洞空無虛上第二真人頌曰至人證法空性淨內無垢心欲既已除無染無所有是故得解脫不受於諸受到彼無為場常貴而食母上第三真人頌曰無處無終始不亡亦不依無念無色愛冥合希夷微得等真一遊變化莫能推洞豁洞無相升玄歸不歸上第四真人頌曰無空無無色無識無見習無心無無想無性無緣集神形不相隨相依不相入永斷生死流衆苦莫能及上第五真人頌曰心體無方所實性虛中存欲習既滅盡神洞入無間不住諸有空不舍太清門自然通妙極遊居真淨天上第六真人頌曰正性無取捨色習自然亡不盡於有為不處於道場常於無邊境順物而不明無礙無區分玄同至道綱上第七真人頌曰照智入緣起神朗太虛沖無色習已滅宿結盡虛融乃於生死海逍遙解脫宫無起於太定運慧曠無窮上第八真人頌曰心道不二倫無際亦無處在用而常寂無生無所主真妄體同源應變無常所百法自開眀三密洞然舉上第九真人頌曰空慧自在力感證致法身二諦即常寂三代照員珍今古無先後所主人非人七變無恆相六通非異神是時頁人各各頌已咸皆恭敬處在其位心懷歡喜具整威儀回向道君設禮而去洞玄靈寶九真人五復三歸行道觀門經
  hash: sha256:7fa1ad288deae4bba773d6e484fa23a5d859d735940f79b7aa059f3c91ae1e5d
