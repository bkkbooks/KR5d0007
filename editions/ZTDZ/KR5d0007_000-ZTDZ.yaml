body:
  text: 眞人行道任證頌道言善男女等欲得絶離諸苦昇入無爲當修習九頁進道之行夫道行者持戒止念净心守一外斷諸見内除衆垢出離三有證彼無爲自然而然得無上位爾時眞人聞說是義心生解脫即至道場隨淺隨深俱蒙益利各稱其力而說頌曰初第一眞人頌曰了出諸見諦心靜外垢除六邪虚妄盡正一自然居致得證無我至獨而不孤昇遊衆妙門永洞空無虚上第二眞人頌曰至人證法空性净内無垢心欲既已除無染無所有是故得解脫不受於諸受到彼無爲場常貴而食母上第三眞人頌曰無處無終始不亡亦不依無念無色愛冥合希夷微得等眞一遊變化莫能推洞豁洞無相昇玄歸不歸上第四眞人頌曰無空無無色無識無見習無心無無想無性無緣集神形不相隨相依不相入永斷生死流衆苦莫能及上第五眞人頌曰心體無方所實性虚中存欲習既滅盡神洞入無間不住諸有空不舍太清門自然通妙極遊居真净天上第六眞人頌曰正性無取捨色習自然亡不盡於有爲不處於道場常於無邊境順物而不明無礙無區分玄同至道綱上第七眞人頌曰照智入緣起神朗太虚冲無色習已滅宿結盡虚融乃於生死海逍遥解脫宫無起於太定運慧曠無窮上第八眞人頌曰心道不二倫無際亦無處在用而常寂無生無所主眞妄體同源應變無常所百法自開眀三密洞然舉上第九眞人頌曰空慧自在力感證致法身二諦即常寂三代照員珍今古無先後所主人非人七變無恒相六通非異神是時頁人各各頌已咸皆恭敬處在其位心懷歡喜具整威儀迴向道君設禮而去洞玄靈寳九眞人五復三歸行道觀門經
