front:
  text: 洞玄靈寳九眞人五復三歸行道觀門經道言善男女等修行正道當須無欲自觀妙見眞心洞然明照有爲想念見在心中非起照心知取心法但了心了心法勿起了心了心法但心寂勿起寂心寂但寂非寂勿非寂不寂又言木無火土無火是二無同木無火木無人是二無同心無知木無知是二無同心無知心無木是二無同同中亂故取眞則謬同外斷故取眞則無故大混之中有無量性無量之性同依正性感致生相如木出火如心起知化現世間無常生滅眞道正性實無生滅人能凈心與道合者則是反本復命眞常爾時玄中而作頌日知起因於境火發生於緣各是眞種性乘流失道源起心欲息知心起知更煩了知性本空知即衆妙門道言㪚朴爲器乘流識境識境法中有四妄知一内心知二外境知三中共知四捨無知然此妄知但有名字離此四妄亦無别眞所以者何知非二故内外妄知非一故中間妄知非無故斷而妄知非有故常而妄是故識境如露如泡又云凡夫作奇爲幻聖人神通爲化影響夢想爲虚同相取頁爲謬唯有慧力明照其頁了心即道頁妄不二不捨内外眞妄不一隨境現識隨識見境識之與境無正有無無後無先不常不斷畢竟清静善寂無爲自然而然登太一果是爲復道反本頁常爾時空中而作頌曰㪚朴爲諸器輪像出無形中持不殆信乘流運死生識境互依起内外妄知成了明眞妄一歸心與道冥道言從青至黄爲波浪捨青等色入眼爲歸身從眼至耳爲輪識捨眼等根復心爲歸神從念至念爲生滅捨念等數反寂爲歸命歸命合道道亦合之内外同眞自在無礙無礙之性法界徧通徧通道眼照諸品相青等諸相現道眼中眼之與相非即非離等行眞體不斷不常於是法中而作頌曰心凈眞根現根净妙境彰境妙通心净心清復命常道心本不二同流五趣方離物離生死非人非道場道言從夷至秦爲流轉從人至鬼爲方馳從俗入仙爲却死從凡入聖爲歸常歸常復命復命證道道性澄净普徧圓明故能持照夷等諸相相之與性相依依而有念念不住共生共滅此生滅性不生不滅不生不滅故非假非眞是故諸道境界同入大道性中超出有爲離諸緣相於是性中而作頌曰夷秦等諸界識感同業鄉人鬼等道殊有無互不妨却死行歸道復命反眞常澄心道眼净衆妙現其方道言頁人所行四種法門天人男女有能修行不懈則得昇入無爲與道合眞道言道德頁妙體元無極洞運陰陽凝靈天地流精散朴裁品成形形倫所感不受地業業性之應開併萬端識地冥元無復增减唯有生死遂染成因九獄五真乘行而受何謂九獄一者違大道契窈冥自然謝頁常隱量鬼來加法體伏報清真獄玉皇主之寂等以持罪二者違冥德致化元清受濁至性波癡鬼來加種識變報三結獄天皇主之躁等以持罪三者違性本起染情玄精喪頁惠没畸鬼來加緣體滅報終甫獄地皇主之妄等以持罪四者違理性趣亂煩意性惑識本殘詐鬼來加方身壞報五倫獄人皇主之苦等以持罪五者違信行誑口擁脾勞蒼天鬼加志廢身亡報普掠獄黄帝主之杖等以持罪六者違仁行殺眼闇肝壞素天鬼加魂散身亡報風雷獄青帝主之刀等以持罪七者違義行劫鼻塞肺枯丹天鬼加魄去身亡報金剛獄白帝主之燌等以持罪八者違禮行淫舌爽心驚玄天鬼加神逝身亡報火翳獄赤帝主之冰等以持罪九者違智行愚耳聾腎竭鎮天鬼加精枯身亡報溟泠獄黑帝主之壓等以持罪然此獄中所受之罪重者計劫輕者計年隨其業力歷周方數諸上之獄逮而輪之若欲離者當修五勝之行何謂五勝一者初察五知明十行有無妄門二者次觀心智了無常生滅化門三者進修信惠净業田復命寂門四者妙致種玄混冥蒂洞眞明門五者染契照道登通明眞洞證門此之五眞所修之行身心洞妙具足圓成出離無常得頁常道眞常道者並徧無窮非有非無不常不斷是爲頁道正性自然而然於是法中而作頌曰眞常持六道貫境起違倫昭昭依寂野冥冥萬象分感業禀形化形感致心神神形互依止動爲來業因九犯致其獄五勝登其眞道妙通心海心妙道自然爲無非絶性爲有非兩邊在物非生死離物非常存道言善男女等若能修行五勝昇入眞門則得出離九獄登無上位具足法界證道眞常爾時仙衆聞說是義心懷歡喜而讚偈日十方無極界一道一衆生六趣連淪海一常一敗成頁妄無二實罪福不虚名唯當證道體三界即三清
